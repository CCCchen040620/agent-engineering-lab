services:
  backend:
    build: .
    command: >
      sh -c "python -m week10.migrate_sqlite_schema
      && python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      OLLAMA_BASE_URL: ${DOCKER_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      BACKEND_API_BASE_URL: http://backend:8000
      LLM_MODEL: ${LLM_MODEL:-qwen3.6:latest}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-bge-m3:latest}
      DEFAULT_TOP_K: ${DEFAULT_TOP_K:-3}
      DEFAULT_MIN_SCORE: ${DEFAULT_MIN_SCORE:-0.3}
      MAX_DOCUMENT_TITLE_CHARS: ${MAX_DOCUMENT_TITLE_CHARS:-100}
      MAX_DOCUMENT_CONTENT_CHARS: ${MAX_DOCUMENT_CONTENT_CHARS:-20000}
      MAX_UPLOAD_FILE_BYTES: ${MAX_UPLOAD_FILE_BYTES:-1048576}
    volumes:
      - .:/app
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build: .
    command: >
      python -m streamlit run frontend/streamlit_app.py
      --server.address=0.0.0.0
      --server.port=8501
    ports:
      - "8501:8501"
    environment:
      OLLAMA_BASE_URL: ${DOCKER_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      BACKEND_API_BASE_URL: http://backend:8000
      LLM_MODEL: ${LLM_MODEL:-qwen3.6:latest}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-bge-m3:latest}
      DEFAULT_TOP_K: ${DEFAULT_TOP_K:-3}
      DEFAULT_MIN_SCORE: ${DEFAULT_MIN_SCORE:-0.3}
      MAX_DOCUMENT_TITLE_CHARS: ${MAX_DOCUMENT_TITLE_CHARS:-100}
      MAX_DOCUMENT_CONTENT_CHARS: ${MAX_DOCUMENT_CONTENT_CHARS:-20000}
      MAX_UPLOAD_FILE_BYTES: ${MAX_UPLOAD_FILE_BYTES:-1048576}
    volumes:
      - .:/app
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/_stcore/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
